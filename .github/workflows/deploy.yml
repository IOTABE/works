name: Deploy via aaPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Executar comandos no aaPanel via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Entrar na pasta do projeto (Ajuste o caminho!)
            cd /www/wwwroot/works
            
            # 2. Puxar as novidades do Git
            git pull origin main
            
            # 3. Ativar o VirtualEnv do aaPanel 
            # O aaPanel costuma criar em um caminho como: venv/bin/activate
            source 038703c7230ae012e3c783ace1d09d64_venv/bin/activate
            
            # 4. Atualizar dependências e Banco
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            
            # 5. Reiniciar a aplicação no Python Manager do aaPanel
            # Dependendo da versão do Python Manager, reiniciar o painel recarrega os projetos:
            sudo bt 1 
            
            # (Alternativa Menos Agressiva) Matar os processos do projeto para auto-restart:
            # pkill -f "python_manager_works" # Troque para o nome correto caso precise