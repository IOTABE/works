{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-100 p-8 mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Entrar na Conta</h1>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.errors %}
            <p class="text-red-500 text-sm mb-4 text-center">Usuário ou senha incorretos, tente novamente.</p>
        {% endif %}
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Usuário</label>
            <input type="text" name="username" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" required>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Senha</label>
            <input type="password" name="password" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" required>
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded hover:bg-blue-700 transition">
            Entrar
        </button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        Ainda não tem conta? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Registre-se aqui</a>
    </p>
</div>
{% endblock %}
