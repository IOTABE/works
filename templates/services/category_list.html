{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Gerenciar Categorias</h1>
        <a href="{% url 'category_create' %}" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-lg font-bold transition shadow-sm">
            + Nova Categoria
        </a>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden border border-gray-100">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nome</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Slug</th>
                    <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Ações</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for category in categories %}
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ category.name }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ category.slug }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-3">
                        <a href="{% url 'category_update' category.pk %}" class="text-blue-600 hover:text-blue-900 font-semibold">Editar</a>
                        <form action="{% url 'category_delete' category.pk %}" method="POST" class="inline" onsubmit="return confirm('Tem certeza que deseja excluir a categoria {{ category.name }}?');">
                            {% csrf_token %}
                            <button type="submit" class="text-red-600 hover:text-red-900 font-semibold cursor-pointer">Excluir</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="px-6 py-8 text-center text-sm text-gray-500">
                        <p class="mb-2">Nenhuma categoria encontrada no sistema.</p>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
