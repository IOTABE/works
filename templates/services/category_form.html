{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8">
    <div class="mb-6">
        <a href="{% url 'category_list' %}" class="text-emerald-600 hover:text-emerald-800 hover:underline font-medium flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Voltar para lista
        </a>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">{{ title }}</h1>

        <form method="POST">
            {% csrf_token %}
            
            <div class="space-y-5">
                {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    <div class="mt-1">
                        {{ field }}
                    </div>
                    {% if field.help_text %}
                    <p class="mt-2 text-xs text-gray-500">{{ field.help_text }}</p>
                    {% endif %}
                    {% for error in field.errors %}
                    <p class="mt-1 text-sm text-red-600 bg-red-50 p-2 rounded">{{ error }}</p>
                    {% endfor %}
                </div>
                {% endfor %}
            </div>

            <div class="mt-8 flex justify-end">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2.5 rounded-lg font-bold transition shadow-sm">
                    {{ button_text }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
